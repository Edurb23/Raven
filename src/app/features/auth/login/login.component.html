<main class="auth-page">
  <a class="auth-brand" routerLink="/" aria-label="Back to Raven landing">Raven</a>

  <div class="auth-vinyl-field" aria-hidden="true">
    <img class="auth-vinyl auth-vinyl--one" src="/assets/vinyl/vinyl-01.png" alt="" />
    <img class="auth-vinyl auth-vinyl--two" src="/assets/vinyl/vinyl-03.png" alt="" />
    <img class="auth-vinyl auth-vinyl--three" src="/assets/vinyl/vinyl-05.png" alt="" />
    <img class="auth-vinyl auth-vinyl--four" src="/assets/vinyl/vinyl-02.png" alt="" />
  </div>

  <section class="auth-shell" aria-labelledby="login-title">
    <section class="auth-card">
    <div class="auth-card__content">
      <p class="auth-card__eyebrow">Welcome back</p>

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">
        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="email" placeholder="you@example.com" />
        </label>

        <label>
          <span>Password</span>
          <input type="password" formControlName="password" autocomplete="current-password" placeholder="Password" />
        </label>

        <div class="auth-form__row">
          <label class="auth-check">
            <input type="checkbox" formControlName="remember" />
            <span>Remember me</span>
          </label>
          <a routerLink="/login">Forgot password?</a>
        </div>

        <button type="submit" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            Logging in...
          } @else {
            Log in
          }
        </button>
      </form>

      <p class="auth-switch">
        New to Raven?
        <a routerLink="/register">Create an account</a>
      </p>
    </div>
    </section>
  </section>

  @if (toastMessage()) {
    <aside
      class="auth-toast"
      [class.auth-toast--success]="toastType() === 'success'"
      [class.auth-toast--error]="toastType() === 'error'"
      role="status"
      aria-live="polite"
    >
      <span aria-hidden="true"></span>
      <p>{{ toastMessage() }}</p>
    </aside>
  }
</main>
