<main class="auth-page">
  <a class="auth-brand" routerLink="/" aria-label="Back to Raven landing">Raven</a>

  <div class="auth-vinyl-field" aria-hidden="true">
    <img class="auth-vinyl auth-vinyl--one" src="/assets/vinyl/vinyl-02.png" alt="" />
    <img class="auth-vinyl auth-vinyl--two" src="/assets/vinyl/vinyl-04.png" alt="" />
    <img class="auth-vinyl auth-vinyl--three" src="/assets/vinyl/vinyl-01.png" alt="" />
    <img class="auth-vinyl auth-vinyl--four" src="/assets/vinyl/vinyl-05.png" alt="" />
  </div>

  <section class="auth-shell" aria-labelledby="register-title">
    <section class="auth-card">
    <div class="auth-card__content">
      <p class="auth-card__eyebrow" id="register-title">Join Raven</p>

      <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="submit()">
        <label>
          <span>Name</span>
          <input type="text" formControlName="name" autocomplete="name" placeholder="Your name" />
        </label>

        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="email" placeholder="you@example.com" />
        </label>

        <label>
          <span>Password</span>
          <input type="password" formControlName="password" autocomplete="new-password" placeholder="At least 8 characters" />
        </label>

        <label class="auth-check">
          <input type="checkbox" formControlName="terms" />
          <span>I agree to Raven's future terms and community guidelines.</span>
        </label>

        <button type="submit">Create account</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a routerLink="/login">Log in</a>
      </p>
    </div>
    </section>
  </section>
</main>
