<article class="album-card">
  <div class="album-card__cover">
    <img [src]="album().cover" [alt]="album().title + ' album cover'" />
    <span>{{ album().rating.toFixed(1) }}</span>
  </div>
  <div class="album-card__body">
    <h3>{{ album().title }}</h3>
    <p>{{ album().artist }}</p>
    <small>{{ album().genre }} · {{ album().year }}</small>
  </div>
</article>
