<header class="top-bar">
  <label class="search">
    <span>Search</span>
    <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" />
    </svg>
    <input type="search" placeholder="Search albums, reviews, artists..." />
    <kbd>Ctrl K</kbd>
  </label>

  <div class="top-bar__actions">
    <div class="notifications">
      <button
        class="notifications__trigger"
        type="button"
        aria-label="Notifications"
        aria-haspopup="dialog"
        [attr.aria-expanded]="notificationsOpen()"
        (click)="toggleNotifications()"
      >
        <span class="notifications__count" aria-label="{{ notificationCountLabel() }} unread notifications">
          {{ notificationCountLabel() }}
        </span>
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M18 16v-5a6 6 0 0 0-12 0v5l-2 2h16l-2-2Zm-8 4h4" />
        </svg>
      </button>

      @if (notificationsOpen()) {
        <section class="notifications__dropdown" role="dialog" aria-label="Recent notifications">
          <header class="notifications__header">
            <div>
              <p>Notifications</p>
              <h2>Recent activity <span>{{ notificationCountLabel() }}</span></h2>
            </div>
            <button type="button" aria-label="Close notifications" (click)="closeNotifications()">x</button>
          </header>

          <div class="notifications__list">
            @for (notification of notifications; track notification.title) {
              <button type="button" class="notifications__item" (click)="closeNotifications()">
                <span class="notifications__badge">{{ notification.type }}</span>
                <strong>{{ notification.title }}</strong>
                <small>{{ notification.description }}</small>
                <time>{{ notification.time }}</time>
              </button>
            }
          </div>

          <footer class="notifications__footer">
            <button type="button">Mark all as read</button>
          </footer>
        </section>
      }
    </div>

    <a class="avatar" href="/app" aria-label="Open profile">E</a>
  </div>
</header>
