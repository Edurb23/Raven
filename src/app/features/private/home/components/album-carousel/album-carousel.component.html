<div class="carousel" aria-label="Recently viewed albums">
  @for (album of albums(); track album.title) {
    <article class="album-card">
      <img [src]="album.cover" [alt]="album.title + ' album cover'" />
      <div>
        <h3>{{ album.title }}</h3>
        <p>{{ album.artist }}</p>
        @if (album.meta) {
          <span>{{ album.meta }}</span>
        }
      </div>
    </article>
  }
</div>
